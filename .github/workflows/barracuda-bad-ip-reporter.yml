name: Barracuda Webhook Reporter

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  report-malicious-ips:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Bad-Ip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run barracuda script
        env:
          BLOCKLIST_URL: https://raw.githubusercontent.com/duggytuxy/Data-Shield_IPv4_Blocklist/refs/heads/main/prod_data-shield_ipv4_blocklist.txt
          WEBHOOK_URL_IP: ${{ secrets.WEBHOOK_URL_IP }}
        run: python barracuda.py

      - name: Push seen_ips.log to logs branch
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Sauvegarde du log gÈnÈrÈ
          cp logs/seen_ips.log /tmp/seen_ips.log

          # Bascule sur la branche logs
          git fetch origin logs || git checkout -b logs
          git checkout logs || git checkout -b logs
          
          # Mise ‡ jour du fichier
          mkdir -p logs
          cp /tmp/seen_ips.log logs/seen_ips.log

          # Commit et push
          git add logs/seen_ips.log
          git commit -m "update: malicious IPs $(date -u +'%Y-%m-%dT%H:%M:%SZ') [skip ci]" || echo "Nothing to commit"
          git push origin logs

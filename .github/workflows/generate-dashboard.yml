name: Update Threat Dashboard

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r Map-bad-ip/requirements.txt
          pip install lxml_html_clean mistralai

      - name: Fetch and Process Data
        env:
          IPINFO_TOKEN: ${{ secrets.IPINFO_TOKEN }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python Map-bad-ip/src/fetch_ips.py
          python Map-bad-ip/src/geolocate.py
          python Map-bad-ip/src/aggregate.py
          python Map-bad-ip/src/visualizev2.py

      - name: Commit and Push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Map-bad-ip/data/ geo_enriched.csv index.html || true
          git commit -m "data: refresh threat map [skip ci]" || echo "No changes"
          git pull --rebase origin main
          git push origin main

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
